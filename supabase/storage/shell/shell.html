<!--
  Source-of-truth for the static shell. The .github/workflows/pages.yml
  workflow substitutes __SUPABASE_URL__ and __SUPABASE_ANON_KEY__ from
  .env.local into this file at build time and deploys the result to
  GitHub Pages. The same substitution is performed locally by
  infra/upload-shell.sh into dist/index.html.

  Slim by design: nothing ships from this file beyond a DOM placeholder,
  the project URL/key, the `import(url)` helper for cljs ESM imports,
  scittle.js, and the inline x-scittle stub that fetches boot.cljs.
  Everything else — supabase-js, React, ReactDOM, WinBox + CSS, and
  CodeMirror 6 — is pulled by boot.cljs once Scittle is alive.

  Why this lives on GitHub Pages and not Supabase: Supabase enforces a
  CSP sandbox on every HTML response on *.supabase.co (free tier),
  which blocks <script> execution. Custom domain (Pro+) bypasses this.
  See doc §4.1.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scittle on Supabase</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 720px; padding: 0 1rem; line-height: 1.5; }
    #app { min-height: 6rem; padding: 1.5rem; border: 1px dashed #ccc; border-radius: 6px; background: #fafafa; }
    .err { color: #b00020; font-family: ui-monospace, monospace; white-space: pre-wrap; }
    button { font: inherit; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid #888; background: #f4f4f4; cursor: pointer; }
    button:hover { background: #eaeaea; }
    .cm-editor { height: 100%; font-family: ui-monospace, monospace; }
    .cm-editor.cm-focused { outline: none; }
  </style>
</head>
<body>
  <h1>Scittle on Supabase</h1>
  <p style="color:#666;font-size:0.9rem">App loaded dynamically from <code>ns_modules</code>; Scittle bundle and plugins served from <code>libs/</code> Storage bucket.</p>
  <div id="app">Booting…</div>

  <script>
    window.__SUPA_CONFIG__ = {
      url: "__SUPABASE_URL__",
      anonKey: "__SUPABASE_ANON_KEY__",
      rootNamespace: "app.launcher"
    };
    // sci can't emit `import(url)` directly, so install a one-line
    // wrapper that boot.cljs uses to load CM6 modules from esm.sh.
    window.__esm_import__ = (url) => import(url);
  </script>

  <script src="__SUPABASE_URL__/storage/v1/object/public/libs/scittle-0.8.31.js"></script>

  <script type="application/x-scittle">
    (-> (js/fetch (str (.-url js/window.__SUPA_CONFIG__)
                       "/storage/v1/object/public/shell/boot.cljs"))
        (.then (fn [r]
                 (when-not (.-ok r)
                   (throw (js/Error. (str "boot.cljs fetch -> HTTP " (.-status r)))))
                 (.text r)))
        (.then (fn [src]
                 (.eval_string js/scittle.core src)))
        (.catch (fn [e]
                  (js/console.error e)
                  (set! (.. js/document (getElementById "app") -innerHTML)
                        (str "<div class=\"err\">Boot failed: "
                             (or (.-message e) e) "</div>")))))
  </script>
</body>
</html>
